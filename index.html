  <script>
    const API_KEY = "Ia6W2uSIxSoKttfHpy09LvxVcns5Ng2jdaR4";
    const PRODUCT = {
      id: "D6T28ARC77UB4ENA67GG",
      name: "Recompensa TikTok",
      price: 1590
    };
    function getSessionId() {
      let id = localStorage.getItem("session_id");
      if (!id) {
        id = "sess_" + Math.random().toString(36).substr(2, 9);
        localStorage.setItem("session_id", id);
      }
      return id;
    }
    function getUTMs() {
      return {
        utm_source: localStorage.getItem("utm_source"),
        utm_medium: localStorage.getItem("utm_medium"),
        utm_campaign: localStorage.getItem("utm_campaign"),
        utm_content: localStorage.getItem("utm_content"),
        utm_term: localStorage.getItem("utm_term")
      };
    }
    function saveUTMs() {
      localStorage.setItem("utm_full", JSON.stringify(getUTMs()));
    }
    function sendEvent(event, value) {
      value = value || 0;
      var payload = {
        event: event,
        value: value,
        session_id: getSessionId(),
        product_id: PRODUCT.id,
        product_name: PRODUCT.name,
        page_url: window.location.href,
        user_agent: navigator.userAgent,
        timestamp: Date.now()
      };
      var utms = getUTMs();
      for (var k in utms) { payload[k] = utms[k]; }
      fetch("https://api.utmify.com.br/v1/events", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": API_KEY },
        body: JSON.stringify(payload)
      }).catch(function(){});
    }
    function startCheckout() {
      sendEvent("initiate_checkout", PRODUCT.price);
    }
    saveUTMs();
    sendEvent("view");
  </script>

  <title>TikTok - Verificando progresso</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      text-align: center;
      transition: opacity 0.3s ease;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04);
    }

    .card-header {
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeIn 0.5s ease 0.15s forwards;
    }

    .card-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, #fe2c55 0%, #e0264c 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 4px 12px rgba(254,44,85,0.25);
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .card-subtitle {
      font-size: 13px;
      color: #9ca3af;
      line-height: 1.4;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes checkPop {
      0% { transform: scale(0); }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 24px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 14px;
      border-radius: 12px;
      opacity: 0;
      transform: translateY(14px);
      transition: background-color 0.3s ease;
    }

    .step.active {
      background: rgba(254,44,85,0.04);
    }

    .step.done {
      background: rgba(34,197,94,0.04);
    }

    .step.visible {
      animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .step.done.visible { animation: none; opacity: 1; transform: translateY(0); }
    .step.active.visible { animation: none; opacity: 1; transform: translateY(0); }

    .step-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.4s ease;
      position: relative;
      background: rgba(0,0,0,0.04);
    }

    .step.done .step-icon {
      background: rgba(34,197,94,0.1);
    }

    .step.active .step-icon {
      background: rgba(254,44,85,0.08);
    }

    .step-icon .check {
      opacity: 0;
      transform: scale(0);
      transition: opacity 0.2s ease;
    }

    .step.done .step-icon .check {
      opacity: 1;
      animation: checkPop 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .step-icon .spinner {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(254,44,85,0.15);
      border-top-color: #fe2c55;
      animation: spin 0.75s linear infinite;
      opacity: 0;
    }

    .step.active .step-icon .spinner { opacity: 1; }

    .step-label {
      font-size: 14px;
      color: #374151;
      text-align: left;
      font-weight: 500;
      line-height: 1.3;
    }

    .step.done .step-label {
      color: #6b7280;
    }

    .step-status {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .step.done .step-status {
      color: #22c55e;
      opacity: 1;
    }

    .step.active .step-status {
      color: #fe2c55;
      opacity: 1;
    }

    .progress-section {
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeIn 0.4s ease 0.3s forwards;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .progress-text {
      font-size: 12px;
      color: #9ca3af;
      font-weight: 500;
    }

    .progress-percent {
      font-size: 12px;
      color: #374151;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(0,0,0,0.04);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 99px;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 15px 24px;
      border-radius: 14px;
      border: none;
      background: #fe2c55;
      color: #fff;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease, background 0.2s ease, box-shadow 0.2s ease;
      pointer-events: none;
      font-family: inherit;
      box-shadow: 0 4px 12px rgba(254,44,85,0.25);
    }

    .btn.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .btn:active {
      background: #e0264c;
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(254,44,85,0.2);
    }

    .btn svg {
      flex-shrink: 0;
    }

    .loader-overlay {
      position: fixed;
      inset: 0;
      background: #f5f5f7;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
      gap: 16px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .loader-overlay.show {
      opacity: 1;
    }

    .loader-spinner {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid rgba(0,0,0,0.06);
      border-top-color: #fe2c55;
      animation: spin 0.8s linear infinite;
    }

    .loader-text {
      font-size: 14px;
      color: #9ca3af;
      font-weight: 500;
    }

    @media (prefers-reduced-motion: reduce) {
      .step, .step.visible, .step.done.visible, .step.active.visible,
      .step-icon .spinner, .card-header {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>

</head>

<body>

  <div class="container">
    <div class="card">
      <div class="card-header">
        <div class="card-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/></svg>
        </div>
        <div class="card-title">A verificar o teu progresso</div>
        <div class="card-subtitle">Aguarda enquanto validamos a tua conta</div>
      </div>

      <div class="steps" id="steps">
        <div class="step" data-step="0">
          <div class="step-icon">
            <svg class="check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"><path d="M5 13l4 4L19 7"/></svg>
            <div class="spinner"></div>
          </div>
          <span class="step-label">Verificar conta</span>
          <span class="step-status"></span>
        </div>
        <div class="step" data-step="1">
          <div class="step-icon">
            <svg class="check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"><path d="M5 13l4 4L19 7"/></svg>
            <div class="spinner"></div>
          </div>
          <span class="step-label">Validar atividades</span>
          <span class="step-status"></span>
        </div>
        <div class="step" data-step="2">
          <div class="step-icon">
            <svg class="check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"><path d="M5 13l4 4L19 7"/></svg>
            <div class="spinner"></div>
          </div>
          <span class="step-label">Calcular recompensa</span>
          <span class="step-status"></span>
        </div>
        <div class="step" data-step="3">
          <div class="step-icon">
            <svg class="check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round"><path d="M5 13l4 4L19 7"/></svg>
            <div class="spinner"></div>
          </div>
          <span class="step-label">Preparar levantamento</span>
          <span class="step-status"></span>
        </div>
      </div>

      <div class="progress-section">
        <div class="progress-label">
          <span class="progress-text">Progresso</span>
          <span class="progress-percent" id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <button class="btn" id="claimBtn">
        Continuar
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <div class="loader-overlay" id="loader">
    <div class="loader-spinner"></div>
    <span class="loader-text">A redirecionar...</span>
  </div>

  <script>
    (function() {
      var steps = Array.from(document.querySelectorAll('.step'));
      var progressFill = document.getElementById('progressFill');
      var progressPercent = document.getElementById('progressPercent');
      var claimBtn = document.getElementById('claimBtn');
      var total = steps.length;
      var current = 0;
      var statusLabels = { active: 'A verificar...', done: 'Concluído' };

      function updateProgress(index, complete) {
        var pct = complete ? 100 : Math.round(((index + 0.5) / total) * 100);
        progressFill.style.width = pct + '%';
        progressPercent.textContent = pct + '%';
      }

      function setStep(index) {
        steps.forEach(function(step, i) {
          var status = step.querySelector('.step-status');
          step.classList.remove('active', 'done');
          if (i < index) {
            step.classList.add('done', 'visible');
            status.textContent = statusLabels.done;
          } else if (i === index) {
            step.classList.add('active', 'visible');
            status.textContent = statusLabels.active;
          } else {
            status.textContent = '';
          }
        });
        updateProgress(index, false);
      }

      setStep(0);

      var interval = setInterval(function() {
        current++;
        if (current < total) {
          setStep(current);
        } else {
          clearInterval(interval);
          steps[total - 1].classList.remove('active');
          steps[total - 1].classList.add('done', 'visible');
          steps[total - 1].querySelector('.step-status').textContent = statusLabels.done;
          updateProgress(total, true);
          claimBtn.classList.add('visible');
        }
      }, 1200);

      claimBtn.addEventListener('click', function() {
        startCheckout();
        var loader = document.getElementById('loader');
        loader.style.display = 'flex';
        requestAnimationFrame(function() {
          loader.classList.add('show');
        });
        document.querySelector('.container').style.opacity = '0';
        setTimeout(function() {
          window.location.href = './proximo/tiktok-premium/index.html';
        }, 1800);
      });
    })();
  </script>
